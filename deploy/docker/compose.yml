# AgentWorks always-on runners via Docker Compose.
#
#   1. Clone your repo to ./repo (or adjust the volume).
#   2. Copy aw.env.example -> aw.env (see ../systemd/aw.env.example),
#      fill in GH_TOKEN / REVIEW_GITHUB_TOKEN / AW_REPO. Never commit it.
#   3. docker compose up -d --build
#
# The worker and reviewer MUST run as different GitHub identities for
# strict adversarial review: give each service its own token env.

services:
  worker:
    build:
      context: .
      args: { AGENT_CLI: claude }
    command: ["scripts/start_work.sh"]
    env_file: aw.env
    environment:
      AW_SINGLE_INSTANCE: "1"
    volumes:
      - ./repo:/work/repo
      - aw-state:/work/repo/.aw
    restart: unless-stopped

  reviewer:
    build:
      context: .
      args: { AGENT_CLI: claude }
    command: ["scripts/review_work.sh"]
    env_file: aw.reviewer.env   # contains REVIEW_GITHUB_TOKEN (second identity)
    volumes:
      - ./repo:/work/repo
      - aw-state:/work/repo/.aw
    restart: unless-stopped

volumes:
  aw-state:
