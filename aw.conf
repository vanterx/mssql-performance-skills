# aw.conf — committed, team-wide defaults for AgentWorks.
#
# Every AW_* variable (and REVIEW_GITHUB_TOKEN) can be set here; anything
# else is ignored by the loader, and values are never eval'd. Precedence:
#   environment  >  aw.conf.local (gitignored)  >  aw.conf  >  built-ins
#
# NEVER put secrets in this file — it is committed. REVIEW_GITHUB_TOKEN
# and machine-local choices belong in aw.conf.local or the environment.
# Full reference with defaults: .claude/docs/aw/OPERATIONS.md
#
# The autonomy toggles (auto_triage, auto_resume, planner, ...) are NOT
# settable here by design — they live in .github/autonomy.json, a
# reviewed governance surface. See .claude/docs/aw/AUTONOMY.md.

# ---------------------------------------------------------------------------
# Repository
# ---------------------------------------------------------------------------
# Target repo as owner/name. Default: auto-detected from the clone's
# remote via `gh repo view`.
# AW_REPO=owner/name

# ---------------------------------------------------------------------------
# Agent selection
# ---------------------------------------------------------------------------
# Which agent CLI the loops invoke: claude | codex | hermes | opencode.
# AW_AGENT=claude

# Model override passed to the agent CLI (empty = the CLI's default).
# AW_MODEL=

# Provider name (hermes only).
# AW_PROVIDER=

# Hermes profile and flags (hermes only).
# AW_HERMES_PROFILE=
# AW_HERMES_FLAGS=--yolo --source tool

# Codex unattended-execution flags.
# AW_CODEX_FLAGS=--dangerously-bypass-approvals-and-sandbox

# Claude Code permission mode: default | acceptEdits | bypassPermissions | plan.
# preflight warns on unknown values.
# AW_CLAUDE_PERMISSION_MODE=bypassPermissions

# Hard cap in seconds for a single agent invocation (0 = no timeout).
# AW_AGENT_TIMEOUT=2400

# Byte cap on captured agent output; hitting it is treated as a tooling
# failure (item released/retried), never as a work verdict. Default 10 MB.
# AW_AGENT_OUTPUT_LIMIT=10485760

# ---------------------------------------------------------------------------
# Loop behavior (start_work.sh / review_work.sh / triage_work.sh)
# ---------------------------------------------------------------------------
# Max items to process per invocation (0 = unlimited). Prefer a finite
# batch for cron-driven runners.
# AW_MAX=0

# Idle poll interval in seconds; 0 = exit when the queue is empty.
# Defaults: 180 (worker), 60 (reviewer).
# AW_POLL_SECONDS=180

# Agent-triage loop idle poll (triage_work.sh).
# AW_TRIAGE_POLL_SECONDS=300

# 1 = report every intended action without invoking an agent or touching
# GitHub state. Also available as --dry-run on each script.
# AW_DRY_RUN=0

# 1 = refuse to start a second instance of the same script for the same
# repo on this machine (accidental-duplicate guard).
# AW_SINGLE_INSTANCE=0

# ---------------------------------------------------------------------------
# Queue timing / garbage collection (reap.sh)
# ---------------------------------------------------------------------------
# Seconds a "status: claimed" issue may sit with no PR before reap.sh
# releases it back to available.
# AW_CLAIM_TTL=7200

# Seconds a "status: changes-requested" issue may sit assigned with no
# rework pushed before reap.sh unassigns it.
# AW_REWORK_TTL=7200

# Seconds before another reviewer may take over a stale "review: claimed"
# lock on a PR.
# AW_REVIEW_CLAIM_TTL=1800

# Base jitter (seconds) for settling simultaneous claim races.
# AW_CLAIM_SETTLE=8

# Backoff (seconds) after the agent reports a rate-limit/quota signal.
# AW_USAGE_LIMIT_SLEEP=3600

# ---------------------------------------------------------------------------
# Reliability
# ---------------------------------------------------------------------------
# Attempts for gh_retry-wrapped API calls, and the first backoff delay in
# seconds (doubles per attempt).
# AW_RETRY_MAX=3
# AW_RETRY_BASE=2

# ---------------------------------------------------------------------------
# Review & merge gate (review_work.sh / merge_ready.sh)
# ---------------------------------------------------------------------------
# Second GitHub identity's token for strict adversarial review. SECRET —
# set it in aw.conf.local or the environment, never here.
# REVIEW_GITHUB_TOKEN=

# 1 = explicitly permit self-review when no REVIEW_GITHUB_TOKEN is set
# (solo mode; stamped on every artifact). Machine/operator choice —
# prefer aw.conf.local.
# AW_ALLOW_SOLO_REVIEW=0

# 1 = the review loop merges on PASS (once quorum, if any, is met).
# AW_AUTO_MERGE=1

# Distinct trusted approvals required before auto-merge. Default: the
# required_approvals value from .github/trusted-reviewers.json.
# AW_REVIEW_QUORUM=

# Target a single PR (review_work.sh / merge_ready.sh), and force a
# re-review of a head SHA that already has a verdict.
# AW_PR=
# AW_FORCE=0

# 1 = merge_ready.sh actually merges READY PRs (default: report only).
# AW_MERGE=0

# Commit-status context used as the merge gate (must match the check
# required by branch protection).
# AW_REVIEW_CHECK_CONTEXT=aw/merge-gate

# ---------------------------------------------------------------------------
# Trust model
# ---------------------------------------------------------------------------
# Path to the reviewer trust config.
# AW_TRUSTED_REVIEWERS_FILE=.github/trusted-reviewers.json

# Ad-hoc overrides of that file (comma-separated logins / a count).
# Prefer editing the JSON — these are for one-off runs.
# AW_TRUST_WHITELIST=
# AW_REQUIRED_APPROVALS=

# ---------------------------------------------------------------------------
# Prompts & policy
# ---------------------------------------------------------------------------
# Directory of the {{var}} prompt templates the loops render.
# AW_PROMPTS_DIR=prompts

# 1 = inject tests-first requirements into work/rework prompts AND a
# missing-tests NEEDS_WORK criterion into the review prompt. Stays 0 in
# this repo — no test suite (Markdown-only skills library);
# scripts/verify-docs.sh is the correctness gate instead.
# AW_ENFORCE_TDD=0

# ---------------------------------------------------------------------------
# Autonomy plumbing (the toggles themselves live in autonomy.json)
# ---------------------------------------------------------------------------
# Path to the autonomy switchboard (e.g. a machine-local variant to keep
# one runner more conservative than the committed config).
# AW_AUTONOMY_FILE=.github/autonomy.json

# Override planner.max_issues_per_run for this runner.
# AW_PLAN_MAX_ISSUES=

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
# Log verbosity: debug | info | warn | error.
# AW_LOG_LEVEL=info

# Log line format: text | json (json for log shippers).
# AW_LOG_FORMAT=text

# Also append every log line to this file (empty = stderr only).
# AW_LOG_FILE=

# Append-only JSONL audit trail of every state transition. Empty string
# disables it (not recommended).
# AW_AUDIT_LOG=.aw/audit.jsonl
