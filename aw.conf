# aw.conf — committed, team-wide defaults for the agent workflow.
# Never put secrets here; use aw.conf.local (gitignored) or the
# environment for REVIEW_GITHUB_TOKEN and machine-specific values.
#
# Precedence: environment > aw.conf.local > aw.conf > built-in defaults.
# Full reference: .claude/docs/aw/OPERATIONS.md
#
# This repo runs Claude Code as the default agent; OpenCode is also
# supported (AW_AGENT=opencode, flags via AW_OPENCODE_FLAGS).
AW_AGENT=claude
# AW_MODEL=
# AW_POLL_SECONDS=180
# AW_MAX=0
# AW_AGENT_TIMEOUT=2400
# AW_AGENT_OUTPUT_LIMIT=10485760
# AW_LOG_LEVEL=info
# AW_LOG_FORMAT=text
# AW_SINGLE_INSTANCE=0
# AW_PROMPTS_DIR=prompts
# Markdown-only skills library — no test suite, so tests-first enforcement stays off.
AW_ENFORCE_TDD=0
# AW_REVIEW_QUORUM=
