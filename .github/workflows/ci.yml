name: ci

# Lint and validate the orchestration tooling itself on every PR and push
# to the default branch. Zero model tokens — static analysis only.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # AgentWorks-owned scripts only — this repo also has its own pre-existing
  # scripts/ tooling (generate-inventory.sh, install-hooks.sh,
  # verify-docs.sh) that predates this workflow and is out of scope here.
  AW_SCRIPTS: >-
    scripts/doctor.sh scripts/merge_ready.sh scripts/metrics.sh
    scripts/reap.sh scripts/render_prompt.sh scripts/review_work.sh
    scripts/start_work.sh scripts/validate.sh scripts/triage_work.sh
    scripts/plan_work.sh scripts/lib/common.sh

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n (syntax)
        run: |
          set -e
          for f in $AW_SCRIPTS; do
            echo "== $f"
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          set -e
          # shellcheck ships preinstalled on ubuntu runners
          shellcheck --severity=warning --external-sources $AW_SCRIPTS

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test harness
        run: ./tests/run.sh

  lint-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML
        run: |
          python3 - <<'EOF'
          import glob, sys, yaml
          files = glob.glob(".github/**/*.yml", recursive=True)
          failed = False
          for f in files:
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f"OK   {f}")
              except Exception as e:
                  print(f"FAIL {f}: {e}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Validate trusted-reviewers.json
        run: |
          jq -e 'has("whitelist") and has("required_approvals")' .github/trusted-reviewers.json

      - name: Run content validator
        # example/ (the template's own sanity-check target) was removed
        # after the SETUP.md trial (see PR #57) — prompts/ is real,
        # present content that keeps this check meaningful.
        run: ./scripts/validate.sh prompts
