name: issue-status

# Pure label bookkeeping — the CI-side mirror of scripts/lib/common.sh's
# set_status_label(). Zero model tokens, runs on the ambient GITHUB_TOKEN.
# This keeps an issue's status label correct even when a PR is merged or
# closed by a human directly on GitHub, without needing start_work.sh or
# review_work.sh to be running at that moment.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: issue-status-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sweep linked issue status
        env:
          GH_TOKEN: ${{ github.token }}
          AW_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_STATE: ${{ github.event.pull_request.state }}
        run: |
          set -uo pipefail
          source scripts/lib/common.sh
          ME="github-actions[bot]"

          issues="$(issue_for_pr "$PR_NUMBER")"
          if [ -z "$issues" ]; then
            issues="$(issue_addressed_by_pr "$PR_NUMBER")"
          fi
          [ -n "$issues" ] || { echo "no linked issue found for PR #$PR_NUMBER"; exit 0; }

          if [ "$PR_STATE" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
            new_status="done"
          elif [ "$PR_STATE" = "closed" ]; then
            new_status="available"
          else
            new_status="in-review"
          fi

          for n in $issues; do
            echo "issue #$n -> status: $new_status"
            set_status_label "$n" "$new_status"
          done
