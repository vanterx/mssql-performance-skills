name: validate

# Runs this repo's own documentation consistency gate (scripts/verify-docs.sh)
# against every PR. verify-docs.sh checks cross-file consistency across the
# WHOLE repo (skills/*/SKILL.md counts against PERFORMANCE_TUNING_GUIDE.md,
# README.md, CLAUDE.md, LLM_COST_ESTIMATION.md all at once), so it needs the
# full checkout rather than an overlay of just "skills/".
#
# This is safe as a plain `pull_request` trigger (no secrets, no elevated
# token, runs against the PR's own head) because verify-docs.sh only reads
# and greps markdown — it never executes PR content, installs from it, or
# sources it.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run verify-docs.sh
        run: bash scripts/verify-docs.sh
