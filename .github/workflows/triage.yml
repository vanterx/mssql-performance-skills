name: triage

# Deterministic auto-triage tier (autonomy L2): issues opened by TRUSTED
# authors are labeled "status: available" automatically — zero model
# tokens, ambient GITHUB_TOKEN only. Everyone else waits for either the
# agent-triage loop (scripts/triage_work.sh) or a human.
#
# No-op unless .github/autonomy.json has auto_triage.enabled=true and
# the author is listed in auto_triage.trusted_authors. The daily cap
# applies. See .claude/docs/aw/AUTONOMY.md ("What each rung costs you").

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: read

concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auto-label trusted-author issue
        env:
          GH_TOKEN: ${{ github.token }}
          AW_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          set -uo pipefail
          source scripts/lib/common.sh
          ME="github-actions[bot]"

          [ "$(autonomy_setting '.auto_triage.enabled' 'false')" = "true" ] \
            || { echo "auto-triage disabled — no-op"; exit 0; }

          autonomy_setting '.auto_triage.trusted_authors' '[]' \
            | jq -e --arg l "$ISSUE_AUTHOR" 'index($l) != null' >/dev/null \
            || { echo "author @$ISSUE_AUTHOR not in trusted_authors — leaving for agent/human triage"; exit 0; }

          # already has a status label? never overwrite human state
          gh issue view "$ISSUE_NUMBER" --repo "$AW_REPO" --json labels \
            --jq '[.labels[].name] | map(select(startswith("status: "))) | length' \
            | grep -qx 0 || { echo "issue already has a status label — no-op"; exit 0; }

          cap="$(autonomy_setting '.auto_triage.max_auto_available_per_day' '20')"
          today="$(gh search issues --repo "$AW_REPO" "\"aw-auto-triage\" in:comments created:>=$(date -u +%Y-%m-%d)" --json number --jq 'length' 2>/dev/null || echo 0)"
          [ "$today" -lt "$cap" ] \
            || { echo "daily auto-triage cap ($cap) reached — leaving for human"; exit 0; }

          set_status_label "$ISSUE_NUMBER" "available"
          gh issue comment "$ISSUE_NUMBER" --repo "$AW_REPO" --body "<!-- aw-auto-triage -->
          🤖 Auto-triage: author @$ISSUE_AUTHOR is trusted — added to the work queue." >/dev/null
          echo "issue #$ISSUE_NUMBER -> status: available (trusted author)"
