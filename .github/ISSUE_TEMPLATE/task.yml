name: Task
description: A unit of work for the agent workflow queue
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to happen, and why.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will a reviewer know this is done correctly?
    validations:
      required: true
  - type: input
    id: depends
    attributes:
      label: Depends on (optional)
      description: "If this must wait for other issues, add lines like: Depends-on: #12 — the worker loop skips this issue until they close."
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        This issue is invisible to the automation until it has a
        `status: available` label. A maintainer should add that label
        after triage (see `.claude/docs/aw/AUTOMATION.md`).
