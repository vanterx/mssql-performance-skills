# Reference label taxonomy for this workflow. Not applied automatically —
# create these on your repo, e.g. with `gh label create` or a label-sync
# action. See .claude/docs/aw/GETTING_STARTED.md.

- name: "status: available"
  color: "0E8A16"
  description: "Up for grabs — the only status the worker loop picks up"
- name: "status: claimed"
  color: "FBCA04"
  description: "A worker is currently on this"
- name: "status: in-review"
  color: "1D76DB"
  description: "PR open, awaiting adversarial review"
- name: "status: changes-requested"
  color: "D93F0B"
  description: "Review found problems — routed back for rework"
- name: "status: blocked"
  color: "B60205"
  description: "Waiting on something; automation ignores this issue"
- name: "status: done"
  color: "5319E7"
  description: "Merged and complete"
- name: "review: claimed"
  color: "FEF2C0"
  description: "A reviewer is holding this PR (double-review lock)"
- name: "review: human-only"
  color: "B60205"
  description: "Skip all review automation; a human must review and merge"
- name: "do-not-automate"
  color: "000000"
  description: "Parking brake — excluded from every automation queue"
- name: "priority: high"
  color: "B60205"
  description: "Jumps to the front of every queue"
